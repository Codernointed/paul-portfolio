<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background-color: rgb(0, 0, 0);
      margin: 0;
    }

    #webgl {
      pointer-events: none;
    }

    #ui-app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #ui {
      position: absolute;
      overflow: hidden;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #monitor-videos {
      pointer-events: none;
      position: 'absolute';
      opacity: 0;
      width: 0;
      height: 0;
      top: 0;
      left: 0;

    }

    #css {
      cursor: pointer;
    }

    #ui-interactive {
      position: absolute;
      top: 0;
      left: 0;
      width: 256px;
    }

    video {
      position: absolute;
      top: 0;
      pointer-events: none;
    }
  </style>

  <!-- Primary Meta Tags -->
  <title>Paul Botchwey - Portfolio 2026</title>
  <meta name="title" content="Paul Botchwey - Mobile App Developer, Data Scientist & ML Engineer">
  <meta name="description"
    content="I'm Paul Botchwey (Codernointed), a Mobile App Developer, Data Scientist & ML Engineer based in Accra, Ghana. Explore my interactive portfolio.">

  <!-- Open Graph / Facebook -->

    content="I'm Paul Botchwey (Codernointed), a Mobile App Developer, Data Scientist & ML Engineer based in Accra, Ghana. Explore my interactive portfolio.">

  <!-- Twitter -->

  <meta property="twitter:url" content="https://paulbotchwey.com/">
  <meta name="twitter:url" content="https://paulbotchwey.com/">

  <meta property="twitter:title" content="Paul Botchwey - Mobile App Developer, Data Scientist & ML Engineer">
  <meta name="twitter:title" content="Paul Botchwey - Mobile App Developer, Data Scientist & ML Engineer">

    content="I'm Paul Botchwey (Codernointed), a Mobile App Developer, Data Scientist & ML Engineer based in Accra, Ghana. Explore my interactive portfolio.">

<body>

  <div id="monitor-videos">
    <video id="video-1" muted loop autoplay width="0" height="0" src="../static/textures/monitor/video/base-static.mp4"
